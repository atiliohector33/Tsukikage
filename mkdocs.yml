site_name: Tsukikage
site_description: One decorator. Total visibility.
site_url: https://atiliohector33.github.io/Tsukikage
repo_url: https://github.com/atiliohector33/Tsukikage
repo_name: atiliohector33/Tsukikage
copyright: MIT License — Built with care, named after moonlight.

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Decorators:
    - decorators/index.md
    - "⏱  timer": decorators/timer.md
    - "🚫  timeout": decorators/timeout.md
    - "📊  profile": decorators/profile.md
    - "🐛  debug": decorators/debug.md
  - Roadmap: roadmap.md
